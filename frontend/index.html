<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Web Viewer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="toolbar" aria-label="Gezinme araç çubuğu">
        <div class="nav-buttons">
          <button id="back-btn" type="button" aria-label="Geri">←</button>
          <button id="forward-btn" type="button" aria-label="İleri">→</button>
          <button id="refresh-btn" type="button" aria-label="Yenile">⟳</button>
        </div>

        <label class="url-field">
          <span class="sr-only">URL</span>
          <input
            id="url-input"
            name="url"
            type="url"
            placeholder="https://example.com"
            inputmode="url"
            autocomplete="off"
          />
        </label>

        <button id="go-btn" type="button" class="go-btn">Git</button>
      </header>

      <section class="viewer" aria-live="polite">
        <iframe id="content-frame" title="İçerik görüntüleyici" sandbox="allow-scripts allow-forms"></iframe>

        <div id="fallback" class="fallback hidden" role="status">
          <h2>İçerik görüntülenemedi</h2>
          <p>
            Hedef sayfa, <code>X-Frame-Options</code> veya <code>Content-Security-Policy</code>
            nedeniyle iframe içinde açılmayı engelliyor olabilir.
          </p>
          <p id="fallback-url"></p>
        </div>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
